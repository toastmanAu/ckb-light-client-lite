name: Build Static Light Client

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream ckb-light-client tag to build (e.g. v0.5.5-rc1)'
        required: true
        default: 'v0.5.5-rc1'
  schedule:
    # Check for new upstream releases weekly
    - cron: '0 6 * * 1'

env:
  UPSTREAM_REPO: nervosnetwork/ckb-light-client
  CARGO_TERM_COLOR: always
  # Strip symbols at link time (rustc >= 1.59) — no external strip tool needed
  RUSTFLAGS: -C strip=symbols

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            pkg_suffix: aarch64-linux-musl-static
          - target: x86_64-unknown-linux-musl
            pkg_suffix: x86_64-linux-musl-static

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Get upstream tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.upstream_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Validate tag format: only allow [A-Za-z0-9._-]
            if ! printf '%s' "$INPUT_TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
              echo "::error::Invalid tag format: $INPUT_TAG" >&2
              exit 1
            fi
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            # Find latest release
            TAG=$(curl -s "https://api.github.com/repos/$UPSTREAM_REPO/releases/latest" | jq -r .tag_name)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git clone --depth 1 --branch "$TAG" \
            "https://github.com/$UPSTREAM_REPO.git" upstream

      - name: Install Rust
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup override set 1.92.0
          rustup target add "$TARGET"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        run: pip3 install --user cargo-zigbuild==0.20.0

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cd upstream/light-client-bin
          cargo zigbuild --release --target "$TARGET" \
            --no-default-features --features sqlite

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ steps.tag.outputs.tag }}
          PKG_SUFFIX: ${{ matrix.pkg_suffix }}
        run: |
          mkdir -p dist
          cp "upstream/target/$TARGET/release/ckb-light-client" dist/
          cd dist
          tar czf "../ckb-light-client-${TAG}-${PKG_SUFFIX}.tar.gz" \
            ckb-light-client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ckb-light-client-${{ matrix.pkg_suffix }}
          path: ckb-light-client-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Get tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.upstream_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if ! printf '%s' "$INPUT_TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
              echo "::error::Invalid tag format: $INPUT_TAG" >&2
              exit 1
            fi
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -s "https://api.github.com/repos/$UPSTREAM_REPO/releases/latest" | jq -r .tag_name)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}-musl-static
          name: "CKB Light Client Lite ${{ steps.tag.outputs.tag }}"
          body: |
            Static musl builds of [ckb-light-client ${{ steps.tag.outputs.tag }}](https://github.com/nervosnetwork/ckb-light-client/releases/tag/${{ steps.tag.outputs.tag }}).

            **Changes from upstream:**
            - Built with `--target *-unknown-linux-musl` (static linking)
            - SQLite backend instead of RocksDB (`--features sqlite --no-default-features`)
            - Zero system dependencies — runs on any Linux regardless of GLIBC version

            **Tested on:** Anbernic RG-ARC-D/S (Buildroot, GLIBC 2.32), RG35XXH (Knulli)
          files: |
            ckb-light-client-aarch64-linux-musl-static/*.tar.gz
            ckb-light-client-x86_64-linux-musl-static/*.tar.gz
